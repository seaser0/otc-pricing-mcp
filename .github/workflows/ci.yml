name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Linting with ruff
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Check code style
        run: |
          echo "Checking code style with ruff..."
          uv run ruff check src/ tests/

      - name: Check formatting
        run: |
          echo "Checking code formatting with ruff..."
          uv run ruff format --check src/ tests/

  # Type checking with mypy
  typecheck:
    name: Type Check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Check types
        run: |
          echo "Type checking source code with mypy --strict..."
          uv run mypy src/ --strict

  # Unit tests
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          uv run pytest tests/unit/ -v --cov=src/otc_pricing_mcp --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: true

  # Conformance tests
  test-conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Run conformance tests
        run: |
          echo "Running MCP conformance tests..."
          uv run pytest tests/integration/test_mcp_conformance.py -v

  # Static analysis with Bandit
  security-bandit:
    name: Security - Static Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Run Bandit
        run: |
          echo "Running Bandit for security issues..."
          uv run bandit -r src/ -ll -f txt

  # Dependency audit with pip-audit
  security-audit:
    name: Security - Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Run pip-audit
        run: |
          echo "Checking for known CVEs in dependencies..."
          source .venv/bin/activate && pip-audit --desc --skip-editable

  # Container security scan with Trivy
  security-trivy:
    name: Security - Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: |
          echo "Building container image for security scan..."
          docker build -t otc-pricing-mcp:scan .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: otc-pricing-mcp:scan
          format: table
          severity: HIGH,CRITICAL
          # Skip CVEs without an upstream fix — pure noise from base-image
          # distro packages we can't action. We still scan; we just don't
          # fail on them. See SECURITY.md for the policy.
          ignore-unfixed: true
          exit-code: 1

  # Summary job: ensure all checks pass
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        typecheck,
        test-unit,
        test-conformance,
        security-bandit,
        security-audit,
        security-trivy,
      ]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Linting failed"
            exit 1
          fi
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "❌ Type checking failed"
            exit 1
          fi
          if [[ "${{ needs.test-unit.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.test-conformance.result }}" != "success" ]]; then
            echo "❌ Conformance tests failed"
            exit 1
          fi
          if [[ "${{ needs.security-bandit.result }}" != "success" ]]; then
            echo "❌ Bandit security check failed"
            exit 1
          fi
          if [[ "${{ needs.security-audit.result }}" != "success" ]]; then
            echo "❌ Dependency audit failed"
            exit 1
          fi
          if [[ "${{ needs.security-trivy.result }}" != "success" ]]; then
            echo "❌ Container scan failed"
            exit 1
          fi
          echo "✅ All checks passed"
