name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly scan at 2 AM UTC (catches new CVEs published overnight)
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Run pip-audit
        run: |
          echo "Running pip-audit to check for known CVEs..."
          uv run pip-audit --desc --format json | tee audit-report.json
          echo ""
          echo "Failing on CVEs with medium or higher severity..."
          uv run pip-audit --desc --strict

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: audit-report.json

  static-analysis:
    name: Static Analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (with dev extras)
        run: uv sync --extra dev

      - name: Run Bandit
        run: |
          echo "Running Bandit for security issues in Python code..."
          uv run bandit -r src/ -f json -o bandit-report.json
          echo ""
          echo "Failing on HIGH severity findings..."
          uv run bandit -r src/ -ll

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: |
          echo "Building container image for security scan..."
          docker build -t otc-pricing-mcp:scan .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: otc-pricing-mcp:scan
          format: sarif
          output: trivy-results.sarif
          severity: "HIGH,CRITICAL"
          # Skip CVEs without an upstream fix — see SECURITY.md.
          ignore-unfixed: true
          exit-code: 1  # Fail on HIGH/CRITICAL with a published fix

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # Create issue on security scan failure (nightly only)
  report-vulnerabilities:
    name: Report Vulnerabilities
    runs-on: ubuntu-latest
    needs: [dependency-audit, static-analysis, container-scan]
    if: |
      always() &&
      github.event_name == 'schedule' &&
      (needs.dependency-audit.result != 'success' ||
       needs.static-analysis.result != 'success' ||
       needs.container-scan.result != 'success')
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = '[Security Alert] Vulnerabilities detected in nightly scan';
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = `⚠️ **Security vulnerabilities detected in the nightly security scan**

## Details
- **Workflow Run**: [View Results](${workflowUrl})
- **Branch**: \`main\`
- **Triggered**: Nightly security scan
- **Time**: ${new Date().toISOString()}

## Failed Checks
${{ needs.dependency-audit.result !== 'success' ? '- ❌ Dependency Audit (pip-audit)' : '' }}
${{ needs.static-analysis.result !== 'success' ? '- ❌ Static Analysis (Bandit)' : '' }}
${{ needs.container-scan.result !== 'success' ? '- ❌ Container Scan (Trivy)' : '' }}

Please review the [workflow results](${workflowUrl}) for detailed vulnerability information.

---
*This issue was automatically created by the security scanning workflow.*`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['security', 'automated'],
              state: 'open'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (existingIssue) {
              console.log(`Issue #${existingIssue.number} already exists. Updating...`);
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
            } else {
              console.log('Creating new security issue...');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'automated']
              });
            }

  # Summary job: passes only if all security checks pass
  security-summary:
    name: Security Checks Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, static-analysis, container-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.dependency-audit.result }}" != "success" ]]; then
            echo "❌ Dependency audit failed"
            exit 1
          fi
          if [[ "${{ needs.static-analysis.result }}" != "success" ]]; then
            echo "❌ Static analysis failed"
            exit 1
          fi
          if [[ "${{ needs.container-scan.result }}" != "success" ]]; then
            echo "❌ Container scan failed"
            exit 1
          fi
          echo "✅ All security checks passed"

      - name: Check if nightly scan
        if: github.event_name == 'schedule'
        run: echo "✅ Nightly security scan completed successfully"
