apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otc-pricing-mcp
  namespace: argocd
  labels:
    app: otc-pricing-mcp
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/seaser0/otc-pricing-mcp.git
    targetRevision: main
    path: deploy/kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-otc-pricing

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
