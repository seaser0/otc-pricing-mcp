apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otc-pricing-mcp
  namespace: mcp-otc-pricing
  labels:
    app: otc-pricing-mcp
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: otc-pricing-mcp
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
