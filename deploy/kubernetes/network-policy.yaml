# Kubernetes NetworkPolicy: Restrict ingress and egress traffic
# This policy ensures the MCP server can only:
# - Accept traffic from the nginx Ingress controller (port 8080)
# - Send traffic to DNS (port 53) and HTTPS (port 443)
# Implements a "fail-closed" security model.
#
# Deploy with: kubectl apply -f deploy/kubernetes/network-policy.yaml
# Verify with: kubectl get networkpolicies -n mcp-otc-pricing

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otc-pricing-mcp
  namespace: mcp-otc-pricing
  labels:
    app: otc-pricing-mcp
    component: network-policy
spec:
  # Apply this policy to all pods labeled app=otc-pricing-mcp
  podSelector:
    matchLabels:
      app: otc-pricing-mcp

  # Define both ingress and egress rules
  policyTypes:
    - Ingress
    - Egress

  # Ingress rules: what traffic is allowed INTO the pod
  ingress:
    # Allow HTTP traffic from nginx Ingress controller (port 8080)
    # The ingress controller is typically in ingress-nginx namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
      description: "Metrics/health endpoints from Ingress controller"

  # Egress rules: what traffic is allowed OUT of the pod
  egress:
    # Allow DNS queries to kube-system (CoreDNS)
    # This enables hostname resolution for calculator.otc-service.com
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
      description: "DNS resolution via CoreDNS"

    # Allow HTTPS to any destination on port 443
    # (This is needed for OTC API and Let's Encrypt OCSP if used)
    - to:
        - podSelector: {}  # Allow within cluster if services use HTTPS
      ports:
        - protocol: TCP
          port: 443
      description: "Cluster-internal HTTPS services"

    # Allow external HTTPS to calculator.otc-service.com
    # Note: Exact IP range may vary; network plugin determines how external egress is handled
    - to:
        - namespaceSelector: {}  # External traffic (outside cluster)
      ports:
        - protocol: TCP
          port: 443
      description: "External HTTPS (OTC Price Calculator API)"
