# Kubernetes NetworkPolicy: Restrict ingress and egress traffic
# This policy ensures the MCP server can only:
# - Accept traffic from the nginx Ingress controller (port 8080)
# - Send traffic to DNS (port 53) and HTTPS (port 443)
# Implements a "fail-closed" security model.
#
# Deploy with: kubectl apply -f deploy/kubernetes/network-policy.yaml
# Verify with: kubectl get networkpolicies -n mcp-otc-pricing

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otc-pricing-mcp
  namespace: mcp-otc-pricing
  labels:
    app: otc-pricing-mcp
    component: network-policy
spec:
  # Apply this policy to all pods labeled app=otc-pricing-mcp
  podSelector:
    matchLabels:
      app: otc-pricing-mcp

  # Define both ingress and egress rules
  policyTypes:
    - Ingress
    - Egress

  # Ingress rules: what traffic is allowed INTO the pod
  ingress:
    # Allow HTTP traffic from nginx Ingress controller (port 8080).
    # The ingress-nginx controller runs in the headscale namespace on this cluster.
    # Use the standard kubernetes.io/metadata.name label (auto-applied since K8s 1.21).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: headscale
      ports:
        - protocol: TCP
          port: 8080
      description: "Metrics/health endpoints from Ingress controller"

  # Egress rules: what traffic is allowed OUT of the pod
  egress:
    # Allow DNS queries to CoreDNS in kube-system.
    # Use kubernetes.io/metadata.name (auto-label) — not the legacy name: label.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      description: "DNS resolution via CoreDNS"

    # Allow outbound HTTPS to any destination (external OTC API + cluster services).
    # An egress rule with ports but no `to` selector allows traffic to all destinations,
    # including external IPs outside the cluster.
    - ports:
        - protocol: TCP
          port: 443
      description: "HTTPS to OTC Price Calculator API and cluster services"
